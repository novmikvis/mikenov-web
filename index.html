<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Mike Nov | Tech-Curious Designer</title>
        <!-- Preconnect for fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=VT323&display=swap"
            rel="stylesheet"
        />
        <link rel="icon" type="image/svg+xml" href="favicon.svg" />
        <link rel="stylesheet" href="style.css" />

        <!-- Open Graph / LinkedIn / Facebook -->
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://mikenov.com/" />
        <meta property="og:title" content="Mike Nov | Tech-Savvy Designer" />
        <meta
            property="og:description"
            content="Tech curious designer. View my portfolio and connect with me."
        />
        <meta
            property="og:image"
            content="https://mikenov.com/content/preview.jpg"
        />

        <!-- Twitter -->
        <meta property="twitter:card" content="summary_large_image" />
        <meta property="twitter:url" content="https://mikenov.com/" />
        <meta
            property="twitter:title"
            content="Mike Nov | Tech-Savvy Designer"
        />
        <meta
            property="twitter:description"
            content="Tech curious designer. View my portfolio and connect with me."
        />
        <meta
            property="twitter:image"
            content="https://mikenov.com/content/preview.jpg"
        />
    </head>

    <body>
        <div class="layout">
            <main class="hero fade-in-up">
                <div class="avatar-wrapper" id="avatarWrapper">
                    <div class="avatar-circle">
                        <!-- Datamoshed emblem/video 512x512 with SVG fallback -->
                        <video
                            autoplay
                            loop
                            muted
                            playsinline
                            class="avatar-video"
                            poster="content/birdy-vector-2024.svg"
                        >
                            <source
                                src="content/Birdy-Animation-Moshed.mp4"
                                type="video/mp4"
                            />
                        </video>
                    </div>
                </div>

                <div class="info-block">
                    <h1 class="name tech-font-title">Mike&thinsp;Nov</h1>
                    <p class="title tech-font-title">
                        TECH-<span class="tech-font glitch" data-text="CURIOUS"
                            >CURIOUS</span
                        >
                        DESIGNER
                    </p>
                </div>

                <div class="links-block">
                    <div class="social-links">
                        <a
                            href="https://x.com/novmikvis"
                            target="_blank"
                            class="glass-btn btn-anim-1"
                            >Ex Twitter</a
                        >
                        <a
                            href="https://www.linkedin.com/in/mikenov/"
                            target="_blank"
                            class="glass-btn btn-anim-2"
                            >LinkedIn</a
                        >
                        <a
                            href="http://t.me/novmikvis"
                            target="_blank"
                            class="glass-btn btn-anim-3"
                            >Telegram</a
                        >
                    </div>
                </div>
            </main>
        </div>

        <script src="script.js"></script>
    </body>
</html>
