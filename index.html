<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mike Nov | Tech-Curious Designer</title>
    <meta name="description" content="Tech-curious designer and maps geek. View my socials and connect with me!">

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=VT323&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'">
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />

    <style>
        :root {
            --bg: #100F0F;
            --bg-2: #1C1B1A;
            --ui: #282726;
            --ui-2: #343331;
            --ui-3: #403E3C;
            --tx-3: #575653;
            --tx-2: #878580;
            --tx: #CECDC3;
            --cyan: #3AA99F;
            --font-main: 'Inter', sans-serif;
            --font-tech: 'VT323', monospace
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background-color: var(--bg);
            color: var(--tx);
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased
        }

        .layout {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center
        }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.5rem;
            width: 100%
        }

        .fade-in-up {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 1s
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .avatar-wrapper {
            width: 220px;
            height: 220px;
            perspective: 1000px;
            margin-bottom: .5rem
        }

        .avatar-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 20px rgba(16, 15, 15, 0.5), 0 10px 30px rgba(0, 0, 0, 0.5);
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            border: 1px solid var(--ui-2);
            background-color: #fff;
            background-image: url('content/birdy-vector.svg');
            background-size: cover;
            background-position: center
        }

        .avatar-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.05);
            pointer-events: none
        }

        .info-block {
            display: flex;
            flex-direction: column;
            gap: .5rem
        }

        .name {
            font-family: var(--font-tech);
            font-size: 3.5rem;
            font-weight: 400;
            letter-spacing: 0.001em;
            color: var(--tx)
        }

        .title {
            font-family: var(--font-tech);
            font-size: 2rem;
            color: var(--tx-2);
            letter-spacing: 0.05em
        }

        .tech-font {
            font-family: var(--font-tech);
            font-size: 2rem;
            color: var(--cyan)
        }

        .glitch {
            position: relative;
            display: inline-block
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            opacity: 0
        }

        .glitch::before {
            left: 2px;
            text-shadow: -1px 0 var(--cyan);
            animation: glitch-anim-1 3s infinite linear alternate-reverse
        }

        .glitch::after {
            left: -2px;
            text-shadow: -1px 0 #CE5D97;
            animation: glitch-anim-2 5s infinite linear alternate-reverse
        }

        @keyframes glitch-anim-1 {

            0%,
            90% {
                opacity: 0;
                clip-path: inset(0 0 0 0);
                transform: skew(0deg)
            }

            92% {
                opacity: 1;
                clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
                transform: skew(-5deg)
            }

            94% {
                opacity: 1;
                clip-path: polygon(0 20%, 100% 20%, 100% 60%, 0 60%);
                transform: skew(5deg)
            }

            96% {
                opacity: 1;
                clip-path: polygon(0 50%, 100% 50%, 100% 100%, 0 100%);
                transform: skew(-2deg)
            }

            98% {
                opacity: 1;
                clip-path: polygon(0 10%, 100% 10%, 100% 80%, 0 80%);
                transform: skew(2deg)
            }

            100% {
                opacity: 0;
                clip-path: inset(0 0 0 0);
                transform: skew(0deg)
            }
        }

        @keyframes glitch-anim-2 {

            0%,
            92% {
                opacity: 0;
                clip-path: inset(0 0 0 0);
                transform: skew(0deg)
            }

            94% {
                opacity: 1;
                clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
                transform: skew(5deg)
            }

            96% {
                opacity: 1;
                clip-path: polygon(0 10%, 100% 10%, 100% 30%, 0 30%);
                transform: skew(-5deg)
            }

            98% {
                opacity: 1;
                clip-path: polygon(0 40%, 100% 40%, 100% 90%, 0 90%);
                transform: skew(2deg)
            }

            100% {
                opacity: 0;
                clip-path: inset(0 0 0 0);
                transform: skew(0deg)
            }
        }

        .links-block {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: .5rem
        }

        .social-links {
            display: flex;
            flex-wrap: wrap;
            gap: .75rem;
            justify-content: center
        }

        .glass-btn {
            background: var(--bg-2);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--ui);
            border-radius: 999px;
            padding: .6rem 1.25rem;
            color: var(--tx-2);
            font-size: 0.875rem;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all .3s ease, transform .3s ease;
            font-family: var(--font-main);
            opacity: 0;
            transform: translateX(-20px);
            animation: waveIn .6s cubic-bezier(0.16, 1, 0.3, 1) forwards
        }

        .glass-btn.btn-anim-1 {
            animation-delay: 1.6s
        }

        .glass-btn.btn-anim-2 {
            animation-delay: 1.7s
        }

        .glass-btn.btn-anim-3 {
            animation-delay: 1.8s
        }

        @keyframes waveIn {
            to {
                opacity: 1;
                transform: translateX(0)
            }
        }

        .glass-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.05) 50%, rgba(255, 255, 255, 0) 100%);
            transform: skewX(-20deg);
            transition: left .5s ease
        }

        .glass-btn:hover {
            background: var(--ui-2);
            color: var(--cyan);
            border-color: var(--cyan);
            box-shadow: 0 0 15px rgba(58, 169, 159, 0.15);
            transform: translateY(-2px)
        }

        .glass-btn:hover::before {
            left: 150%
        }

        .glass-btn:active {
            transform: translateY(0)
        }

        @media (max-width:480px) {
            .layout {
                padding: 1.5rem .5rem
            }

            .name {
                font-size: 2.8rem
            }

            .title,
            .tech-font {
                font-size: 1.15rem
            }

            .avatar-wrapper {
                width: 60vw;
                height: 60vw;
                max-width: 250px;
                max-height: 250px
            }

            .social-links {
                gap: .35rem
            }

            .glass-btn {
                padding: 0.5rem 0.6rem;
                font-size: 0.8rem
            }
        }
    </style>

    <!-- Open Graph / LinkedIn / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mikenov.com/" />
    <meta property="og:title" content="Mike Nov | Tech-Curious Designer" />
    <meta property="og:description"
        content="Tech-curious designer and maps geek. View my socials and connect with me!" />
    <meta property="og:image" content="https://mikenov.com/content/preview.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://mikenov.com/" />
    <meta property="twitter:title" content="Mike Nov | Tech-Curious Designer" />
    <meta property="twitter:description"
        content="Tech-curious designer and maps geek. View my socials and connect with me!." />
    <meta property="twitter:image" content="https://mikenov.com/content/preview.jpg" />
</head>

<body>
    <div class="layout">
        <main class="hero fade-in-up">
            <div class="avatar-wrapper" id="avatarWrapper">
                <div class="avatar-circle">
                    <!-- Datamoshed emblem/video 512x512 with SVG fallback -->
                    <video autoplay loop muted playsinline class="avatar-video" poster="content/birdy-vector.svg">
                        <source src="content/Birdy-Animation-Moshed.mp4" type="video/mp4" />
                    </video>
                </div>
            </div>

            <div class="info-block">
                <h1 class="name tech-font-title">Mike&thinsp;Nov</h1>
                <p class="title tech-font-title">
                    TECH-<span class="tech-font glitch" data-text="CURIOUS">CURIOUS</span>
                    DESIGNER
                </p>
            </div>

            <div class="links-block">
                <div class="social-links">
                    <a href="https://x.com/novmikvis" target="_blank" class="glass-btn btn-anim-1">Ex Twitter</a>
                    <a href="https://www.linkedin.com/in/mikenov/" target="_blank"
                        class="glass-btn btn-anim-2">LinkedIn</a>
                    <a href="http://t.me/novmikvis" target="_blank" class="glass-btn btn-anim-3">Telegram</a>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => { const e = document.querySelector('.avatar-circle'); window.addEventListener('mousemove', t => { const { clientX: a, clientY: n } = t, { innerWidth: r, innerHeight: o } = window, i = a / r - .5, c = n / o - .5, d = c * -30, l = i * 30; e.style.transform = `rotateX(${d}deg) rotateY(${l}deg)` }) });
    </script>
</body>

</html>
